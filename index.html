<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类丰荣计划 - 运动打卡</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --card-bg: #fffdf9;
            --text-main: #5c4033;
            --border-color: #e6d5c3;
            --accent-color: #d4a373;
            
            /* ========================================== */
            /* 【在这里可以随时替换你想要的数字字体】      */
            /* 例如换成其它字体：'YourFontName', monospace */
            /* ========================================== */
            --day-font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(92, 64, 51, 0.08);
            width: 700px;
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 24px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }
        .header p {
            font-size: 14px;
            color: #8c7365;
            margin: 0;
        }

        .month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
        }
        .month-nav button {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .month-nav button:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #a68a7b;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .day-cell {
            aspect-ratio: 1;
            background: rgba(230, 213, 195, 0.1);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 2px dashed transparent;
            /* 改为 visible，让移到外面的数字也能完美显示 */
            overflow: visible; 
        }

        .day-cell:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .day-cell.empty {
            background: transparent;
            cursor: default;
            border: none;
        }
        .day-cell.empty:hover {
            transform: none;
        }

        /* 日期数字：无背景、无边框、无阴影，完全显示在圆圈正上方，字体可由上方 --day-font 自由替换 */
        .day-number {
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--day-font);
            font-size: 13px;
            font-weight: 900;
            color: #5c4033;
            z-index: 30;
            background: transparent;
            padding: 0;
            border: none;
            box-shadow: none;
            white-space: nowrap;
        }

        .day-cell.stamp-stamped {
            background: #fffdf9;
            border: none;
            box-shadow: 0 4px 12px rgba(92,64,51,0.1);
            border-radius: 50%;
            overflow: visible;
        }

        .stamp-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }
        .stamp-content img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }
        .stamp-subtext {
            position: absolute;
            bottom: 2px;
            font-family: var(--day-font);
            font-size: 8px;
            font-weight: bold;
            color: #7f6354;
            background: rgba(255, 253, 249, 0.9);
            padding: 0 4px;
            border-radius: 4px;
            white-space: nowrap;
            z-index: 15;
        }

        .stats-panel {
            background: rgba(230, 213, 195, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 20px;
        }
        .stat-item .num {
            font-size: 18px;
            font-weight: bold;
            color: #b5651d;
        }
        .stat-item .label {
            font-size: 12px;
            color: #8c7365;
            margin-top: 4px;
        }

        .progress-container {
            background: rgba(230, 213, 195, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px 20px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #5c4033;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .progress-title-btn {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
        }
        .progress-title-btn:hover {
            opacity: 0.7;
        }
        .progress-bar-bg {
            background: #e6d5c3;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #e07a5f, #f4a261);
            height: 100%;
            width: 0%;
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            width: 340px;
            text-align: center;
        }
        .modal-content h3 { margin-top: 0; margin-bottom: 15px;}
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .option-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 5px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }
        .option-btn img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .option-btn:hover {
            background: var(--accent-color);
            color: #fff;
        }
        
        .input-section {
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        .input-section input {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            margin-left: 5px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-btn {
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-confirm { background: #e07a5f; color: #fff; }
        .btn-clear { background: #d3d3d3; color: #5c4033; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>「人类丰荣计划」</h1>
        <p>/ 备战奥运</p>
    </div>

    <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="currentMonthYear">July 2026</span>
        <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="weekdays">
        <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>

    <div class="stats-panel" id="statsPanel"></div>

    <div class="progress-container">
        <div class="progress-info">
            <span class="progress-title-btn" onclick="openGoalModal()" title="点击设置月度目标">
                🐾 本月跑步目标 <span id="goalDisplayText" style="font-weight:normal; font-size:12px; color:#8c7365;">(点击设置)</span>
            </span>
            <span id="runProgressText">0 / 100 公里</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="runProgressBar"></div>
        </div>
    </div>
</div>

<div class="modal" id="actionModal">
    <div class="modal-content">
        <h3>选择今日运动打卡</h3>
        <div class="options-grid" id="optionsGrid"></div>
        
        <div class="input-section" id="inputSection">
            <span id="inputLabel">距离：</span>
            <input type="number" id="detailValue" step="0.1" placeholder="例如 5">
            <span id="inputUnit">公里</span>
        </div>

        <div class="modal-actions">
            <button class="action-btn btn-confirm" id="confirmBtn" style="display:none;" onclick="saveCheckIn()">保存打卡</button>
            <button class="action-btn btn-clear" onclick="clearCheckIn()">清除打卡</button>
            <button class="action-btn" style="background:#eee;" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<div class="modal" id="goalModal">
    <div class="modal-content">
        <h3>设置本月跑步目标</h3>
        <div style="margin-bottom: 15px; font-size: 13px; color:#8c7365;">输入本月计划完成的总公里数：</div>
        <div style="margin-bottom: 20px;">
            <input type="number" id="goalInput" step="1" style="width: 100px; padding: 6px; border: 1px solid var(--border-color); border-radius: 6px; text-align: center; font-size: 16px;" placeholder="100"> 公里
        </div>
        <div class="modal-actions">
            <button class="action-btn btn-confirm" onclick="saveGoal()">保存目标</button>
            <button class="action-btn" style="background:#eee;" onclick="closeGoalModal()">取消</button>
        </div>
    </div>
</div>

<script>
    const sportTypes = {
        'run': { name: '跑步', icon: 'run.png?v=4', unit: '公里', type: 'distance' },
        'dance': { name: '跳舞', icon: 'dance.png?v=4', unit: '分钟', type: 'duration' },
        'badminton': { name: '羽毛球', icon: 'badminton.png?v=4', unit: '分钟', type: 'duration' },
        'workout': { name: '健身', icon: 'workout.png?v=4', unit: '分钟', type: 'duration' },
        'yoga': { name: '瑜伽', icon: 'yoga.png?v=4', unit: '分钟', type: 'duration' },
        'bike': { name: '骑车', icon: 'bike.png?v=4', unit: '公里', type: 'distance' },
        'swim': { name: '游泳', icon: 'swim.png?v=4', unit: '分钟', type: 'duration' }
    };

    let currentDate = new Date(); 
    let checkIns = JSON.parse(localStorage.getItem('sport_checkins')) || {}; 
    let monthlyGoal = localStorage.getItem('monthly_run_goal') ? parseFloat(localStorage.getItem('monthly_run_goal')) : 100;
    
    let selectedDayKey = null;
    let tempSelectedSport = null;

    function initCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('currentMonthYear').innerText = `${monthNames[month]} ${year}`;

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        let firstDayIndex = new Date(year, month, 1).getDay();
        firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 

        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const dateKey = `${year}-${month}-${day}`;
            
            const numSpan = document.createElement('span');
            numSpan.className = 'day-number';
            numSpan.innerText = day;
            cell.appendChild(numSpan);

            if (checkIns[dateKey]) {
                const record = checkIns[dateKey];
                const sport = sportTypes[record.sport];
                
                if (sport) {
                    cell.classList.add('stamp-stamped');

                    const stampDiv = document.createElement('div');
                    stampDiv.className = 'stamp-content';
                    
                    let subTextStr = (record.value !== undefined && record.value !== '') ? `${record.value}${sport.unit}` : '';
                    stampDiv.innerHTML = `<img src="${sport.icon}" alt="${sport.name}"><span class="stamp-subtext">${subTextStr}</span>`;
                    cell.appendChild(stampDiv);
                }
            }

            cell.onclick = () => openModal(dateKey);
            grid.appendChild(cell);
        }

        updateStats(year, month, totalDays);
    }

    function changeMonth(direction) {
        currentDate.setMonth(currentDate.getMonth() + direction);
        initCalendar();
    }

    function openModal(dateKey) {
        selectedDayKey = dateKey;
        tempSelectedSport = null;
        document.getElementById('inputSection').style.display = 'none';
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('detailValue').value = '';

        const modal = document.getElementById('actionModal');
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';

        for (let key in sportTypes) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<img src="${sportTypes[key].icon}" alt="${sportTypes[key].name}"><span>${sportTypes[key].name}</span>`;
            btn.onclick = () => selectSportOption(key);
            grid.appendChild(btn);
        }
        modal.style.display = 'flex';
    }

    function selectSportOption(sportKey) {
        tempSelectedSport = sportKey;
        const sport = sportTypes[sportKey];

        const inputSection = document.getElementById('inputSection');
        const inputLabel = document.getElementById('inputLabel');
        const inputUnit = document.getElementById('inputUnit');
        const detailInput = document.getElementById('detailValue');

        inputLabel.innerText = sport.type === 'distance' ? '运动距离：' : '运动时长：';
        inputUnit.innerText = sport.unit;
        
        if (checkIns[selectedDayKey] && checkIns[selectedDayKey].sport === sportKey) {
            detailInput.value = checkIns[selectedDayKey].value !== undefined ? checkIns[selectedDayKey].value : '';
        } else {
            detailInput.value = '';
        }

        inputSection.style.display = 'block';
        document.getElementById('confirmBtn').style.display = 'inline-block';
    }

    function saveCheckIn() {
        if (!selectedDayKey || !tempSelectedSport) return;
        const val = document.getElementById('detailValue').value;

        checkIns[selectedDayKey] = {
            sport: tempSelectedSport,
            value: val !== '' ? parseFloat(val) : 0
        };

        localStorage.setItem('sport_checkins', JSON.stringify(checkIns));
        closeModal();
        initCalendar();
    }

    function clearCheckIn() {
        if (selectedDayKey && checkIns[selectedDayKey]) {
            delete checkIns[selectedDayKey];
            localStorage.setItem('sport_checkins', JSON.stringify(checkIns));
        }
        closeModal();
        initCalendar();
    }

    function closeModal() {
        document.getElementById('actionModal').style.display = 'none';
    }

    function openGoalModal() {
        document.getElementById('goalInput').value = monthlyGoal;
        document.getElementById('goalModal').style.display = 'flex';
    }

    function closeGoalModal() {
        document.getElementById('goalModal').style.display = 'none';
    }

    function saveGoal() {
        const val = document.getElementById('goalInput').value;
        if (val !== '' && !isNaN(val)) {
            monthlyGoal = parseFloat(val);
            localStorage.setItem('monthly_run_goal', monthlyGoal);
        }
        closeGoalModal();
        initCalendar();
    }

    function updateStats(year, month, totalDays) {
        let activeDays = 0;
        let totalCount = 0;
        let totalRunKm = 0;
        let counts = {};

        for (let key in sportTypes) counts[key] = 0;

        let daysInMonth = totalDays;
        for (let day = 1; day <= daysInMonth; day++) {
            const dateKey = `${year}-${month}-${day}`;
            if (checkIns[dateKey]) {
                activeDays++;
                totalCount++;
                const record = checkIns[dateKey];
                counts[record.sport] = (counts[record.sport] || 0) + 1;

                if (record.sport === 'run') {
                    totalRunKm += Number(record.value || 0);
                }
            }
        }

        const statsPanel = document.getElementById('statsPanel');
        statsPanel.innerHTML = `
            <div class="stat-item"><div class="num">${activeDays}</div><div class="label">运动天数</div></div>
            <div class="stat-item"><div class="num">${totalCount}</div><div class="label">打卡次数</div></div>
            <div class="stat-item"><div class="num">${counts['run'] || 0}</div><div class="label">跑步</div></div>
            <div class="stat-item"><div class="num">${counts['dance'] || 0}</div><div class="label">舞蹈</div></div>
            <div class="stat-item"><div class="num">${counts['badminton'] || 0}</div><div class="label">羽毛球</div></div>
            <div class="stat-item"><div class="num">${counts['workout'] || 0}</div><div class="label">健身</div></div>
        `;

        document.getElementById('goalDisplayText').innerText = `(目标: ${monthlyGoal} 公里)`;
        document.getElementById('runProgressText').innerText = `${totalRunKm.toFixed(1)} / ${monthlyGoal} 公里`;
        
        const percent = Math.min(100, (totalRunKm / monthlyGoal) * 100).toFixed(1);
        document.getElementById('runProgressBar').style.width = `${percent}%`;
    }

    initCalendar();
</script>

</body>
</html>
