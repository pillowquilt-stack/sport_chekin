<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类丰荣计划 - 运动打卡</title>
    <!-- 引入 Google Fonts 的 Abel 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <!-- 引入 html2canvas 库 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @font-face {
            font-family: 'FuLuLingGanHeChaTi';
            src: url('./FuLuLingGanHeChaTi-2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #f7f5f0;
            --card-bg: #ffffff;
            --text-main: #3d332a;
            --text-secondary: #8c7d73;
            --border-color: #eae3dc;
            --cell-bg: #faf8f5;
            --accent-color: #c88a59;
            --stamp-bg: #ffffff; 
            --day-font: 'Abel', sans-serif;
            /* 完美兼容：找不到艺术字体时自动平替为 Windows/Mac 自带的圆体或手写风格 */
            --cn-font: 'FuLuLingGanHeChaTi', "YouSheBiaoTiHei", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--cn-font);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 32px;
            box-shadow: 0 12px 35px rgba(61, 51, 42, 0.06);
            width: 500px;
            aspect-ratio: 3 / 4;
            padding: 34px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 5px;
        }
        .header-left {
            text-align: left;
        }
        .header h1 {
            font-size: 26px;
            margin: 0 0 2px 0;
            letter-spacing: 2px;
            color: var(--text-main);
            font-family: var(--cn-font);
            font-weight: normal;
        }
        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
            font-weight: normal;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 14px;
            color: var(--text-main);
            font-family: var(--day-font);
            background: var(--cell-bg);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            flex-shrink: 0;
        }
        .month-nav button {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }
        .month-nav button:hover {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 14px 8px;
            margin-top: 4px;
            margin-bottom: 14px;
        }

        .day-cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .day-cell:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .day-cell.empty {
            background: transparent;
            cursor: default;
            border: none;
        }
        .day-cell.empty:hover {
            transform: none;
        }

        .day-number {
            position: absolute;
            top: -6px;
            right: -2px;
            font-family: var(--day-font);
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            z-index: 30;
            pointer-events: none;
            letter-spacing: -0.5px;
        }

        .day-cell.stamp-stamped {
            background: var(--stamp-bg);
            border: none;
            box-shadow: 0 4px 10px rgba(61, 51, 42, 0.08);
            border-radius: 50%;
        }

        .stamp-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
            overflow: visible;
        }
        .stamp-content img {
            width: 105%;
            height: 105%;
            object-fit: contain;
        }

        .stamp-subtext {
            position: absolute;
            bottom: -8px;
            font-family: var(--day-font);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-main);
            background: var(--card-bg);
            padding: 1px 5px;
            border-radius: 6px;
            white-space: nowrap;
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }

        .stats-panel {
            background: var(--cell-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 8px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .stat-item .num {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
            font-family: var(--day-font);
        }
        .stat-item .label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: normal;
        }

        .progress-container {
            background: var(--cell-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 18px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 6px;
            font-weight: normal;
        }
        .progress-title-btn {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s;
        }
        .progress-title-btn:hover {
            opacity: 0.7;
        }
        .progress-bar-bg {
            background: var(--border-color);
            height: 9px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-fill {
            background: var(--accent-color);
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        /* 悬浮操作按钮区 */
        .float-btns {
            position: fixed;
            top: 25px;
            left: 25px;
            display: flex;
            gap: 10px;
            z-index: 99;
        }
        .float-btn {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: normal;
            color: var(--text-secondary);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(61, 51, 42, 0.05);
            transition: all 0.2s;
            font-family: var(--cn-font);
        }
        .float-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .float-btn.primary {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }
        .float-btn.primary:hover {
            opacity: 0.9;
        }

        /* 右下角悬浮多风格调色盘 */
        .palette-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(61, 51, 42, 0.08);
            z-index: 99;
            font-family: var(--cn-font);
        }
        .palette-float span {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .color-dot:hover {
            transform: scale(1.15);
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: var(--cn-font);
        }
        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            width: 340px;
            text-align: center;
            color: var(--text-main);
        }
        .modal-content h3 { margin-top: 0; margin-bottom: 15px; font-weight: normal; font-size: 20px;}
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .option-btn {
            background: var(--cell-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 5px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-family: var(--cn-font);
        }
        .option-btn img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .option-btn:hover {
            background: var(--accent-color);
            color: #fff;
        }
        
        .input-section {
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .input-section input {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            background: var(--card-bg);
            color: var(--text-main);
            font-family: var(--cn-font);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-btn {
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--cn-font);
        }
        .btn-confirm { background: var(--accent-color); color: #fff; }
        .btn-clear { background: #dcd6ce; color: #3d332a; }
    </style>
</head>
<body>

<!-- 左上角操作按钮 -->
<div class="float-btns">
    <button class="float-btn primary" onclick="exportHighResImage()">📥 下载完美高清海报</button>
</div>

<div class="container" id="captureCard">
    <div class="header">
        <div class="header-left">
            <h1>「人类丰荣计划」</h1>
            <p>/ 备战奥运</p>
        </div>
        <div class="month-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <span id="currentMonthYear">July 2026</span>
            <button onclick="changeMonth(1)">›</button>
        </div>
    </div>

    <div class="weekdays">
        <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>

    <div class="stats-panel" id="statsPanel"></div>

    <div class="progress-container">
        <div class="progress-info">
            <span class="progress-title-btn" onclick="openGoalModal()" title="点击设置月度目标">
                🐾 本月跑步目标 <span id="goalDisplayText" style="font-weight:normal; font-size:13px; color:var(--text-secondary);">(点击设置)</span>
            </span>
            <span id="runProgressText" style="font-family: var(--day-font); font-size: 15px;">0 / 100 km</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="runProgressBar"></div>
        </div>
    </div>
</div>

<!-- 右下角悬浮多风格调色盘 -->
<div class="palette-float" id="paletteFloat">
    <span>🎨 风格</span>
    <div class="color-dot" style="background: #f7f5f0;" onclick="setTheme('#f7f5f0', '#ffffff', '#3d332a', '#8c7d73', '#eae3dc', '#faf8f5', '#c88a59', '#ffffff')" title="原版·暖白米色"></div>
    <div class="color-dot" style="background: #edf2ee;" onclick="setTheme('#edf2ee', '#ffffff', '#2c3832', '#708277', '#d3dec9', '#f4f7f4', '#557a62', '#ffffff')" title="森系·抹茶绿"></div>
    <div class="color-dot" style="background: #fcf3f0;" onclick="setTheme('#fcf3f0', '#ffffff', '#402e2b', '#967770', '#f0ded8', '#fff8f6', '#b86b5e', '#ffffff')" title="温柔·落日粉"></div>
    <div class="color-dot" style="background: #f0f4f8;" onclick="setTheme('#f0f4f8', '#ffffff', '#2a3440', '#728294', '#d4dfec', '#f6f9fc', '#4a709c', '#ffffff')" title="清晨·雾霾蓝"></div>
    <div class="color-dot" style="background: #eef1f5;" onclick="setTheme('#eef1f5', '#ffffff', '#333b48', '#7c8798', '#dce2ec', '#f5f7fa', '#59749c', '#ffffff')" title="高级·暖银灰"></div>
</div>

<!-- 选择运动弹窗 -->
<div class="modal" id="actionModal">
    <div class="modal-content">
        <h3>选择今日打卡项目</h3>
        <div class="options-grid" id="optionsGrid"></div>
        
        <div class="input-section" id="inputSection">
            <span id="inputLabel">距离：</span>
            <input type="number" id="detailValue" step="0.1" placeholder="例如 5">
            <span id="inputUnit">km</span>
        </div>

        <div class="modal-actions">
            <button class="action-btn btn-confirm" id="confirmBtn" style="display:none;" onclick="saveCheckIn()">保存打卡</button>
            <button class="action-btn btn-clear" onclick="clearCheckIn()">清除打卡</button>
            <button class="action-btn" style="background:#ddd; color:#333;" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<!-- 设置月度目标弹窗 -->
<div class="modal" id="goalModal">
    <div class="modal-content">
        <h3>设置本月跑步目标</h3>
        <div style="margin-bottom: 15px; font-size: 14px; color:var(--text-secondary);">输入本月计划完成的总公里数：</div>
        <div style="margin-bottom: 20px;">
            <input type="number" id="goalInput" step="1" style="width: 100px; padding: 6px; border: 1px solid var(--border-color); border-radius: 6px; text-align: center; font-size: 16px; background:var(--card-bg); color:var(--text-main); font-family:var(--cn-font);" placeholder="100"> km
        </div>
        <div class="modal-actions">
            <button class="action-btn btn-confirm" onclick="saveGoal()">保存目标</button>
            <button class="action-btn" style="background:#ddd; color:#333;" onclick="closeGoalModal()">取消</button>
        </div>
    </div>
</div>

<script>
    const sportTypes = {
        'run': { name: '跑步', icon: 'run.png?v=34', unit: 'km', type: 'distance' },
        'dance': { name: '跳舞', icon: 'dance.png?v=34', unit: 'min', type: 'duration' },
        'badminton': { name: '羽毛球', icon: 'badminton.png?v=34', unit: 'min', type: 'duration' },
        'workout': { name: '健身', icon: 'workout.png?v=34', unit: 'min', type: 'duration' },
        'yoga': { name: '瑜伽', icon: 'yoga.png?v=34', unit: 'min', type: 'duration' },
        'bike': { name: '骑车', icon: 'bike.png?v=34', unit: 'km', type: 'distance' },
        'swim': { name: '游泳', icon: 'swim.png?v=34', unit: 'min', type: 'duration' },
        'rest': { name: '休息', icon: 'rest.png?v=34', unit: '', type: 'none' }
    };

    let currentDate = new Date(); 
    let checkIns = JSON.parse(localStorage.getItem('sport_checkins')) || {}; 
    let monthlyGoal = localStorage.getItem('monthly_run_goal') ? parseFloat(localStorage.getItem('monthly_run_goal')) : 100;
    
    let tBg = localStorage.getItem('t_bg') || '#f7f5f0';
    let tCard = localStorage.getItem('t_card') || '#ffffff';
    let tMain = localStorage.getItem('t_main') || '#3d332a';
    let tSec = localStorage.getItem('t_sec') || '#8c7d73';
    let tBorder = localStorage.getItem('t_border') || '#eae3dc';
    let tCell = localStorage.getItem('t_cell') || '#faf8f5';
    let tAccent = localStorage.getItem('t_accent') || '#c88a59';
    let tStampBg = localStorage.getItem('t_stamp_bg') || '#ffffff';
    applyTheme(tBg, tCard, tMain, tSec, tBorder, tCell, tAccent, tStampBg);

    let selectedDayKey = null;
    let tempSelectedSport = null;

    function setTheme(bg, card, main, sec, border, cell, accent, stampBg) {
        localStorage.setItem('t_bg', bg);
        localStorage.setItem('t_card', card);
        localStorage.setItem('t_main', main);
        localStorage.setItem('t_sec', sec);
        localStorage.setItem('t_border', border);
        localStorage.setItem('t_cell', cell);
        localStorage.setItem('t_accent', accent);
        localStorage.setItem('t_stamp_bg', stampBg);
        applyTheme(bg, card, main, sec, border, cell, accent, stampBg);
    }

    function applyTheme(bg, card, main, sec, border, cell, accent, stampBg) {
        const root = document.documentElement;
        root.style.setProperty('--bg-color', bg);
        root.style.setProperty('--card-bg', card);
        root.style.setProperty('--text-main', main);
        root.style.setProperty('--text-secondary', sec);
        root.style.setProperty('--border-color', border);
        root.style.setProperty('--cell-bg', cell);
        root.style.setProperty('--accent-color', accent);
        root.style.setProperty('--stamp-bg', stampBg);
    }

    function initCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        const standardMonths = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('currentMonthYear').innerText = `${standardMonths[month]} ${year}`;

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        let firstDayIndex = new Date(year, month, 1).getDay();
        firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 

        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const dateKey = `${year}-${month}-${day}`;
            
            const numSpan = document.createElement('span');
            numSpan.className = 'day-number';
            numSpan.innerText = day;
            cell.appendChild(numSpan);

            if (checkIns[dateKey]) {
                const record = checkIns[dateKey];
                const sport = sportTypes[record.sport];
                
                if (sport) {
                    cell.classList.add('stamp-stamped');

                    const stampDiv = document.createElement('div');
                    stampDiv.className = 'stamp-content';
                    
                    let subTextStr = '';
                    if (sport.type !== 'none' && record.value !== undefined && record.value !== '') {
                        subTextStr = `${record.value}${sport.unit}`;
                    }

                    let subTextHTML = subTextStr ? `<span class="stamp-subtext">${subTextStr}</span>` : '';
                    stampDiv.innerHTML = `<img src="${sport.icon}" alt="${sport.name}">${subTextHTML}`;
                    cell.appendChild(stampDiv);
                }
            }

            cell.onclick = () => openModal(dateKey);
            grid.appendChild(cell);
        }

        updateStats(year, month, totalDays);
    }

    function changeMonth(direction) {
        currentDate.setMonth(currentDate.getMonth() + direction);
        initCalendar();
    }

    function openModal(dateKey) {
        selectedDayKey = dateKey;
        tempSelectedSport = null;
        document.getElementById('inputSection').style.display = 'none';
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('detailValue').value = '';

        const modal = document.getElementById('actionModal');
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';

        for (let key in sportTypes) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<img src="${sportTypes[key].icon}" alt="${sportTypes[key].name}"><span>${sportTypes[key].name}</span>`;
            btn.onclick = () => selectSportOption(key);
            grid.appendChild(btn);
        }
        modal.style.display = 'flex';
    }

    function selectSportOption(sportKey) {
        tempSelectedSport = sportKey;
        const sport = sportTypes[sportKey];

        const inputSection = document.getElementById('inputSection');
        const inputLabel = document.getElementById('inputLabel');
        const inputUnit = document.getElementById('inputUnit');
        const detailInput = document.getElementById('detailValue');

        if (sport.type === 'none') {
            inputSection.style.display = 'none';
            document.getElementById('confirmBtn').style.display = 'inline-block';
        } else {
            inputLabel.innerText = sport.type === 'distance' ? '运动距离：' : '运动时长：';
            inputUnit.innerText = sport.unit;
            
            if (checkIns[selectedDayKey] && checkIns[selectedDayKey].sport === sportKey) {
                detailInput.value = checkIns[selectedDayKey].value !== undefined ? checkIns[selectedDayKey].value : '';
            } else {
                detailInput.value = '';
            }

            inputSection.style.display = 'block';
            document.getElementById('confirmBtn').style.display = 'inline-block';
        }
    }

    function saveCheckIn() {
        if (!selectedDayKey || !tempSelectedSport) return;
        const sport = sportTypes[tempSelectedSport];
        let val = '';
        if (sport.type !== 'none') {
            val = document.getElementById('detailValue').value;
        }

        checkIns[selectedDayKey] = {
            sport: tempSelectedSport,
            value: val !== '' ? parseFloat(val) : 0
        };

        localStorage.setItem('sport_checkins', JSON.stringify(checkIns));
        closeModal();
        initCalendar();
    }

    function clearCheckIn() {
        if (selectedDayKey && checkIns[selectedDayKey]) {
            delete checkIns[selectedDayKey];
            localStorage.setItem('sport_checkins', JSON.stringify(checkIns));
        }
        closeModal();
        initCalendar();
    }

    function closeModal() {
        document.getElementById('actionModal').style.display = 'none';
    }

    function openGoalModal() {
        document.getElementById('goalInput').value = monthlyGoal;
        document.getElementById('goalModal').style.display = 'flex';
    }

    function closeGoalModal() {
        document.getElementById('goalModal').style.display = 'none';
    }

    function saveGoal() {
        const val = document.getElementById('goalInput').value;
        if (val !== '' && !isNaN(val)) {
            monthlyGoal = parseFloat(val);
            localStorage.setItem('monthly_run_goal', monthlyGoal);
        }
        closeGoalModal();
        initCalendar();
    }

    function updateStats(year, month, totalDays) {
        let activeDays = 0;
        let totalCount = 0;
        let totalRunKm = 0;
        let counts = {};

        for (let key in sportTypes) counts[key] = 0;

        for (let day = 1; day <= totalDays; day++) {
            const dateKey = `${year}-${month}-${day}`;
            if (checkIns[dateKey]) {
                activeDays++;
                totalCount++;
                const record = checkIns[dateKey];
                counts[record.sport] = (counts[record.sport] || 0) + 1;

                if (record.sport === 'run') {
                    totalRunKm += Number(record.value || 0);
                }
            }
        }

        const statsPanel = document.getElementById('statsPanel');
        statsPanel.innerHTML = `
            <div class="stat-item"><div class="num">${activeDays}</div><div class="label">运动天数</div></div>
            <div class="stat-item"><div class="num">${totalCount}</div><div class="label">打卡次数</div></div>
            <div class="stat-item"><div class="num">${counts['run'] || 0}</div><div class="label">跑步</div></div>
            <div class="stat-item"><div class="num">${counts['dance'] || 0}</div><div class="label">舞蹈</div></div>
            <div class="stat-item"><div class="num">${counts['badminton'] || 0}</div><div class="label">羽毛球</div></div>
            <div class="stat-item"><div class="num">${counts['rest'] || 0}</div><div class="label">休息</div></div>
        `;

        document.getElementById('goalDisplayText').innerText = `(目标: ${monthlyGoal} km)`;
        document.getElementById('runProgressText').innerText = `${totalRunKm.toFixed(1)} / ${monthlyGoal} km`;
        
        const percent = Math.min(100, (totalRunKm / monthlyGoal) * 100).toFixed(1);
        document.getElementById('runProgressBar').style.width = `${percent}%`;
    }

    /* 终极高清截图：强制等待浏览器完全渲染并加载完字体后再生成 */
    async function exportHighResImage() {
        // 确保字体完全就绪
        if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
        }

        const card = document.getElementById('captureCard');
        
        html2canvas(card, {
            scale: 3,
            useCORS: true,
            backgroundColor: null,
            logging: false,
            onclone: (clonedDoc) => {
                const clonedCard = clonedDoc.getElementById('captureCard');
                if (clonedCard) {
                    clonedCard.style.width = '500px';
                    clonedCard.style.height = '667px';
                    clonedCard.style.aspectRatio = '3 / 4';
                    clonedCard.style.margin = '0';
                }
            }
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = '人类丰荣计划-运动打卡.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    initCalendar();
</script>

</body>
</html>
